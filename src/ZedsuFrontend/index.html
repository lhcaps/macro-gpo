<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zedsu</title>
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/app.css" />
  <link rel="stylesheet" href="/src/styles/pages/overview.css" />
  <link rel="stylesheet" href="/src/styles/pages/settings.css" />
  <link rel="stylesheet" href="/src/styles/pages/detection.css" />
  <link rel="stylesheet" href="/src/styles/pages/positions.css" />
</head>
<body data-mode="shell">

  <!-- ======================== HUD OVERLAY ======================== -->
  <div id="hud-overlay" class="hud-overlay" style="display:none;">
    <div class="hud-header">
      <span id="hud-status-dot" class="status-dot status-idle"></span>
      <span id="hud-status-text" class="font-mono text-sm">IDLE</span>
      <span class="hud-divider">·</span>
      <span id="hud-combat" class="font-mono text-sm">—</span>
      <span class="hud-divider">·</span>
      <span id="hud-latency" class="font-mono text-sm text-cyan">0ms</span>
    </div>
    <div class="hud-stats">
      <span id="hud-match" class="font-mono text-xs text-muted">—</span>
      <span class="hud-divider-sm">·</span>
      <span id="hud-kills" class="font-mono text-xs text-muted">Kills 0</span>
      <span class="hud-divider-sm">·</span>
      <span id="hud-time" class="font-mono text-xs text-muted">00:00</span>
    </div>
    <div class="hud-expanded" id="hud-expanded" style="display:none;">
      <div class="hud-expanded-row">
        <span class="hud-expanded-label">Intent</span>
        <span id="hud-intent" class="font-mono text-xs text-cyan">—</span>
      </div>
      <div class="hud-expanded-row">
        <span class="hud-expanded-label">Crowd</span>
        <span id="hud-crowd" class="font-mono text-xs">—</span>
      </div>
      <div class="hud-expanded-row">
        <span class="hud-expanded-label">YOLO</span>
        <span id="hud-yolo" class="font-mono text-xs text-muted">—</span>
      </div>
    </div>
    <div class="hud-actions">
      <button class="hud-ctrl-btn" id="hud-cycle-corner" title="Cycle corner">&#x2B21;</button>
      <button class="hud-ctrl-btn" id="hud-toggle-expand" title="Toggle HUD Mode">&#x29E9;</button>
      <button class="hud-ctrl-btn" id="hud-toggle-pin" title="Toggle Pin">&#x1F4CC;</button>
    </div>
  </div>

  <!-- ======================== OPERATOR SHELL ======================== -->
  <div id="app-shell" class="shell" style="display:none;">

    <header class="shell-topbar">
      <div class="topbar-brand">
        <span class="brand-text">Zedsu</span>
        <span id="topbar-status" class="status-pill status-idle">IDLE</span>
        <span id="topbar-backend" class="backend-indicator backend-ok">Backend OK</span>
        <span id="topbar-match" class="text-sm text-muted" style="display:none;"></span>
        <span id="topbar-combat" class="text-sm text-cyan" style="display:none;"></span>
        <span id="topbar-kills" class="text-sm text-cyan" style="display:none;"></span>
      </div>
      <div class="shell-topbar-actions">
        <button class="btn btn-sm btn-secondary" id="btn-hud">HUD</button>
        <button class="btn btn-sm btn-secondary" id="btn-logs">Logs</button>
        <button class="btn btn-sm btn-secondary" id="btn-restart">Restart</button>
        <div class="topbar-divider"></div>
        <button class="btn btn-primary btn-sm" id="btn-start">Start</button>
        <button class="btn btn-sm btn-secondary" id="btn-stop">Stop</button>
        <button class="btn btn-danger btn-sm" id="btn-estop">E-Stop</button>
      </div>
    </header>

    <div class="shell-body">
      <nav class="shell-sidebar">
        <button class="nav-item active" data-page="overview">
          <span class="nav-icon">&#x25C8;</span><span class="nav-label">Overview</span>
        </button>
        <button class="nav-item" data-page="combat-ai">
          <span class="nav-icon">&#x25CE;</span><span class="nav-label">Combat AI</span>
        </button>
        <button class="nav-item" data-page="detection">
          <span class="nav-icon">&#x25C9;</span><span class="nav-label">Detection</span>
        </button>
        <button class="nav-item" data-page="positions">
          <span class="nav-icon">&#x2295;</span><span class="nav-label">Positions</span>
        </button>
        <button class="nav-item" data-page="discord">
          <span class="nav-icon">&#x25CC;</span><span class="nav-label">Discord</span>
        </button>
        <button class="nav-item" data-page="yolo">
          <span class="nav-icon">&#x2B21;</span><span class="nav-label">YOLO</span>
        </button>
        <button class="nav-item" data-page="logs">
          <span class="nav-icon">&#x2630;</span><span class="nav-label">Logs</span>
        </button>
        <button class="nav-item" data-page="diagnostics">
          <span class="nav-icon">&#x26A0;</span><span class="nav-label">Diagnostics</span>
        </button>
        <button class="nav-item" data-page="settings">
          <span class="nav-icon">&#x2699;</span><span class="nav-label">Settings</span>
        </button>
      </nav>

      <main class="shell-main" id="shell-main">
        <div class="page-placeholder">
          <div class="page-placeholder-icon">&#x25C8;</div>
          <p>Loading...</p>
        </div>
      </main>
    </div>

  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="confirm-overlay" style="display:none;">
    <div class="confirm-dialog">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button class="btn btn-sm btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
